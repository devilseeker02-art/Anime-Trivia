<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Anime Trivia Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0D12;
    --bg-raised:#171620;
    --signal:#E6383C;
    --signal-dim:#7a1d20;
    --cyan:#4FD1C5;
    --ink:#F2EFE9;
    --ink-dim:#9B97A8;
    --line:#2A2832;
    --easy:#4FD1C5;
    --medium:#F2B945;
    --hard:#E6383C;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    height:100%;
    overflow:hidden;
  }

  body{
    background-image:
      radial-gradient(ellipse at 20% -10%, rgba(230,56,60,0.10), transparent 50%),
      radial-gradient(ellipse at 100% 110%, rgba(79,209,197,0.07), transparent 55%);
  }

  /* ---------- Scanline / tape texture ---------- */
  .tape-noise{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    opacity:0.035;
    background-image:repeating-linear-gradient(
      0deg, #fff 0px, #fff 1px, transparent 1px, transparent 3px
    );
    mix-blend-mode:overlay;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    position:fixed; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px;
    z-index:20;
  }

  .brand{
    font-family:'Anton',sans-serif;
    font-size:18px;
    letter-spacing:0.06em;
    color:var(--ink-dim);
  }
  .brand span{color:var(--signal);}

  .counter{
    font-family:'Space Mono',monospace;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--ink-dim);
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:3px;
  }
  .counter b{color:var(--cyan); font-weight:700;}

  /* ---------- Main stage ---------- */
  .stage{
    height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:90px 40px 120px;
    position:relative;
    z-index:10;
  }

  .card{
    width:100%;
    max-width:980px;
    display:flex;
    flex-direction:column;
    gap:22px;
    animation:rise .45s ease both;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .meta-row{
    display:flex; align-items:center; gap:12px;
  }

  .tag{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:6px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    color:var(--ink-dim);
  }

  .tag.category{
    color:var(--bg);
    background:var(--cyan);
    border-color:var(--cyan);
    font-weight:700;
  }

  .tag.diff-easy{color:var(--easy); border-color:var(--easy);}
  .tag.diff-medium{color:var(--medium); border-color:var(--medium);}
  .tag.diff-hard{color:var(--hard); border-color:var(--hard);}

  .q-number{
    font-family:'Space Mono',monospace;
    color:var(--ink-dim);
    font-size:13px;
  }

  .question-text{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:clamp(26px, 4vw, 42px);
    line-height:1.2;
    letter-spacing:-0.01em;
  }

  .media-wrap{
    width:100%;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--bg-raised);
    position:relative;
    z-index:1;
  }

  .media-wrap img{
    width:100%;
    max-height:46vh;
    object-fit:contain;
    display:block;
    background:#000;
  }

  .media-wrap iframe{
    width:100%;
    border:0;
    display:block;
  }

  .yt-wrap{position:relative; width:100%; padding-top:56.25%; height:0;}
  .yt-wrap iframe{position:absolute; inset:0; width:100%; height:100%;}

  /* ---------- Native audio player (no title/art/thumbnail possible) ---------- */
  .audio-player-wrap{
    width:100%;
    padding:28px 24px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#F2EFE9;
    border-radius:8px;
  }

  audio{
    width:100%;
    max-width:560px;
    accent-color:var(--signal);
    border-radius:6px;
    position:relative;
    z-index:2;
    pointer-events:auto;
  }

  /* ---------- Answer reveal ---------- */
  .answer-zone{
    border-top:1px dashed var(--line);
    padding-top:18px;
    min-height:64px;
    display:flex; align-items:center;
  }

  .reveal-btn{
    font-family:'Space Mono',monospace;
    font-size:13px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-dim);
    background:transparent;
    border:1px solid var(--line);
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .reveal-btn:hover{
    color:var(--bg);
    background:var(--signal);
    border-color:var(--signal);
  }
  .reveal-btn:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  .answer-wrap{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .answer-text{
    font-family:'Anton',sans-serif;
    font-size:clamp(24px, 3.4vw, 34px);
    color:var(--signal);
    letter-spacing:0.01em;
    animation:flash .35s ease both;
  }

  .bonus-text{
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink-dim);
    font-style:italic;
    line-height:1.5;
    animation:flash .45s ease both;
  }

  @keyframes flash{
    from{opacity:0; transform:scale(0.97);}
    to{opacity:1; transform:scale(1);}
  }

  .answer-text.hidden{display:none;}

  /* ---------- Nav controls ---------- */
  .navbar{
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
    gap:14px;
    padding:22px 28px 26px;
    z-index:20;
    background:linear-gradient(to top, rgba(14,13,18,0.95), transparent);
  }

  .nav-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:12px 22px;
    border-radius:6px;
    cursor:pointer;
    transition:all .15s ease;
    display:flex; align-items:center; gap:8px;
  }
  .nav-btn:hover{border-color:var(--cyan); color:var(--cyan);}
  .nav-btn:disabled{opacity:0.3; cursor:not-allowed;}
  .nav-btn:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  .nav-btn.jump{
    background:transparent;
    border-color:transparent;
    color:var(--ink-dim);
    font-family:'Space Mono',monospace;
    font-size:12px;
  }
  .nav-btn.jump:hover{color:var(--ink);}

  /* ---------- Category jump panel ---------- */
  /* ---------- Landing page: category grid ---------- */
  .landing-screen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:22px; height:100%;
    width:100%;
    max-width:900px;
    overflow-y:auto;
    padding:10px 0;
  }

  .intro-title.small{font-size:clamp(32px, 6vw, 56px); margin-bottom:4px;}

  .landing-actions{
    display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  }

  .shuffle-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    background:var(--bg-raised);
    border:1px solid var(--line);
    padding:14px 24px;
    border-radius:8px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .shuffle-btn:hover{border-color:var(--cyan); color:var(--cyan);}

  .cat-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:14px;
    width:100%;
    margin-top:6px;
  }

  .landing-hint{
    font-family:'Space Mono',monospace;
    font-size:12px;
    color:var(--ink-dim);
    letter-spacing:0.05em;
  }

  .cat-card{
    background:transparent;
    border:none;
    padding:0;
    cursor:pointer;
    perspective:800px;
    height:140px;
  }

  .cat-card.played{cursor:default;}

  .cat-card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .6s cubic-bezier(.4,.1,.2,1);
    transform-style:preserve-3d;
  }

  .cat-card.flipped .cat-card-inner,
  .cat-card.played .cat-card-inner{
    transform:rotateY(180deg);
  }

  .cat-card-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:12px;
    border:1px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px;
  }

  .cat-card-back{
    background:
      repeating-linear-gradient(135deg, #1b1a24 0px, #1b1a24 10px, #201e29 10px, #201e29 20px);
    transition:border-color .15s ease;
  }
  .cat-card:not(.played):hover .cat-card-back{border-color:var(--signal);}

  .cat-card-mark{
    font-family:'Anton',sans-serif;
    font-size:34px;
    color:var(--ink-dim);
  }
  .cat-card-num{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .cat-card-front{
    background:var(--bg-raised);
    transform:rotateY(180deg);
  }

  .cat-card.played .cat-card-front{
    background:#15141c;
    opacity:0.55;
  }

  .cat-card-emoji{font-size:28px;}
  .cat-card-name{
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    text-align:center;
    padding:0 8px;
  }
  .cat-card-count{
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:var(--ink-dim);
    letter-spacing:0.05em;
  }

  @media (max-width: 640px){
    .cat-grid{grid-template-columns:repeat(2, 1fr);}
    .cat-card{height:120px;}
  }

  /* ---------- Hidden category tag (revealed only with answer) ---------- */
  .tag.category.hidden-cat{
    color:var(--ink-dim);
    background:transparent;
    border:1px dashed var(--line);
    font-weight:400;
  }

  /* ---------- Intro / outro screens ---------- */
  .intro-screen, .outro-screen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; height:100%;
  }

  /* ---------- Category intro screen (between mystery card flip and round start) ---------- */
  .cat-intro-screen{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; height:100%;
    animation:rise .4s ease both;
  }
  .cat-intro-art-wrap{
    width:200px; height:200px;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
    background:var(--bg-raised);
  }
  .cat-intro-art{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .cat-intro-emoji{font-size:32px; margin-top:4px;}

  .intro-title{
    font-family:'Anton',sans-serif;
    font-size:clamp(44px, 8vw, 96px);
    letter-spacing:0.02em;
    line-height:1;
  }
  .intro-title .accent{color:var(--signal);}
  .intro-sub{
    font-family:'Space Mono',monospace;
    color:var(--ink-dim);
    font-size:14px;
    letter-spacing:0.12em;
    text-transform:uppercase;
  }
  .start-btn{
    margin-top:18px;
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:16px;
    color:var(--bg);
    background:var(--signal);
    border:none;
    padding:16px 36px;
    border-radius:8px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .start-btn:hover{transform:translateY(-2px);}

  @media (prefers-reduced-motion: reduce){
    .card{animation:none;}
    .answer-text{animation:none;}
    .start-btn:hover{transform:none;}
  }

  @media (max-width: 640px){
    .stage{padding:80px 18px 130px;}
    .question-text{font-size:clamp(22px,5.4vw,30px);}
    .topbar{padding:14px 16px;}
  }
</style>
</head>
<body>

<div class="tape-noise"></div>

<div class="topbar">
  <div class="brand">ANIME TRIVIA <span>NIGHT</span></div>
  <div class="counter" id="counter">00 / 00</div>
</div>

<div class="stage" id="stage">
  <!-- content injected by JS -->
</div>

<div class="navbar">
  <button class="nav-btn" id="prevBtn">&larr; Prev</button>
  <button class="nav-btn jump" id="jumpBtn">Categories</button>
  <button class="nav-btn" id="nextBtn">Next &rarr;</button>
</div>

<script>
/* =========================================================
   QUESTION DATA
   Add new categories by pushing new objects into CATEGORIES.
   Each question: { q, media, answer, difficulty }
   media types: 
     {type:'image', src:'assets/file.png'}
     {type:'spotify', src:'https://open.spotify.com/embed/track/ID'}
     {type:'youtube', id:'VIDEO_ID'}
     {type:'none'}
========================================================= */

const CATEGORY_ART = {
  "Soundtracks": "assets/category_art/soundtracks_art.png",
  "Guess the Anime": "assets/category_art/guess_the_anime_cover.png",
  "Power / Ability Guessing": "assets/category_art/power_ability_energy.png",
  "Who's That Character": "assets/category_art/whos_that_character_art.png",
  "Quotes": "assets/category_art/quotes_art.png",
  "Year / Era Guessing": "assets/category_art/year_era_flip_clock.png"
};

const CATEGORIES = [
  {
    name: "Soundtracks",
    emoji: "🎵",
    questions: [
      {
        q: "Listen to this opening theme. Name the anime.",
        media: {type:'audio', src:'assets/audio/q1.mp3'},
        answer: "One Piece",
        difficulty: "easy"
      },
      {
        q: "Listen to this opening theme. Name the anime.",
        media: {type:'audio', src:'assets/audio/q2.mp3'},
        answer: "Naruto Shippuden",
        difficulty: "easy"
      },
      {
        q: "Listen to this ending theme. Name the anime.",
        media: {type:'audio', src:'assets/audio/q3.mp3'},
        answer: "Death Note (Ending 1)",
        difficulty: "medium"
      },
      {
        q: "Listen to this instrumental OST track. Name the anime.",
        media: {type:'audio', src:'assets/audio/q4.mp3'},
        answer: "Demon Slayer (Kimetsu no Yaiba)",
        difficulty: "medium"
      },
      {
        q: "Listen to this ending theme. Name the anime.",
        media: {type:'audio', src:'assets/audio/q5.mp3'},
        answer: "Cowboy Bebop",
        difficulty: "hard"
      },
      {
        q: "Listen to this opening theme. Name the anime.",
        media: {type:'audio', src:'assets/audio/q6.mp3'},
        answer: "Mobile Suit Gundam SEED",
        difficulty: "hard"
      }
    ]
  },
  {
    name: "Guess the Anime",
    emoji: "🖼️",
    questions: [
      {
        q: "Name the anime.",
        media: {type:'image', src:'assets/q1_mha_deku.png'},
        answer: "My Hero Academia",
        difficulty: "easy"
      },
      {
        q: "Name the anime.",
        media: {type:'image', src:'assets/q2_death_note.png'},
        answer: "Death Note",
        difficulty: "easy"
      },
      {
        q: "Title blurred out \u2014 name the anime from the scene alone.",
        media: {type:'image', src:'assets/q3_attack_on_titan_blurred.png'},
        answer: "Attack on Titan",
        difficulty: "medium"
      },
      {
        q: "Name the anime.",
        media: {type:'image', src:'assets/q4_haikyuu.png'},
        answer: "Haikyuu!!",
        difficulty: "medium"
      },
      {
        q: "Name the anime/film this mobile suit is from.",
        media: {type:'image', src:'assets/q5_sazabi.png'},
        answer: "Mobile Suit Gundam: Char's Counterattack",
        difficulty: "hard"
      },
      {
        q: "Title blurred out \u2014 name the anime.",
        media: {type:'image', src:'assets/q6_dorohedoro_blurred.png'},
        answer: "Dorohedoro",
        difficulty: "hard"
      }
    ]
  },
  {
    name: "Power / Ability Guessing",
    emoji: "⚡",
    questions: [
      {
        q: "This power allows the user to manipulate objects and people with sheer mental force, without lifting a finger. Name the Ability or Anime.",
        media: {type:'none'},
        answer: "Telekinesis \u2014 Mob Psycho 100 (Mob)",
        difficulty: "easy"
      },
      {
        q: "This life-energy power system lets users customize unique techniques based on personality and aura type \u2014 categories include Enhancer, Emitter, and Manipulator. Name the System or Anime.",
        media: {type:'none'},
        answer: "Nen \u2014 Hunter x Hunter",
        difficulty: "easy"
      },
      {
        q: "This technique creates an invisible barrier that automatically slows and eventually halts anything approaching the user, making them nearly untouchable. Name the Technique or Anime.",
        media: {type:'none'},
        answer: "Limitless (\"Infinity\") \u2014 Satoru Gojo \u2014 Jujutsu Kaisen",
        difficulty: "medium"
      },
      {
        q: "This unique skill lets a reincarnated slime devour enemies and absorb their abilities, transforming based on what \u2014 or who \u2014 he's eaten. Name the Skill or Anime.",
        media: {type:'none'},
        answer: "Predator \u2014 Rimuru \u2014 That Time I Got Reincarnated as a Slime",
        difficulty: "medium"
      },
      {
        q: "This power lets the user reflect or redirect the vector of anything that touches them, including bullets fired straight at their head. Name the Ability or Anime.",
        media: {type:'none'},
        answer: "Accelerator (Vector Control / Reflection) \u2014 A Certain Magical Index",
        difficulty: "hard"
      },
      {
        q: "Named after the strongest hero in the world, this power lets him one-shot nearly any opponent \u2014 but the real twist of the series is that he's become too strong to feel a challenge. Name the Character or Anime.",
        media: {type:'none'},
        answer: "Saitama \u2014 One Punch Man",
        difficulty: "hard"
      }
    ]
  },
  {
    name: "Who's That Character",
    emoji: "🕵️",
    questions: [
      {
        q: "Zoomed-in snippet \u2014 name the character and anime.",
        media: {type:'image', src:'assets/wtc/q1_edward_snippet.png'},
        answer: "Edward Elric \u2014 Fullmetal Alchemist: Brotherhood",
        bonus: "Became a State Alchemist at age 12 \u2014 the youngest in history.",
        difficulty: "easy"
      },
      {
        q: "Zoomed-in snippet \u2014 name the character and anime.",
        media: {type:'image', src:'assets/wtc/q2_goku_snippet.png'},
        answer: "Goku \u2014 Dragon Ball Z",
        bonus: "His name comes from Sun Wukong, the Monkey King of Journey to the West; his real Saiyan name is Kakarot.",
        difficulty: "easy"
      },
      {

        media: {type:'image', src:'assets/wtc/q3_asuna_snippet.png'},

        bonus: "Nicknamed \"Lightning Flash\" for her rapier speed \u2014 one of only two players to use her real name as her in-game ID.",

      {

      {

        media: {type:'image', src:'assets/wtc/q5_rem_snippet.png'},

        difficulty: "hard"
      },
      {
        q: "Zoomed-in snippet \u2014 name the character and anime.",
        media: {type:'image', src:'assets/wtc/q6_senku_snippet.png'},

        bonus: "Stayed conscious for all 3,700 years of petrification, counting every single second.",
        difficulty: "hard"
      }
    ]
  },
  {
    name: "Quotes",
    emoji: "💬",
    questions: [
      {
        q: "\u201CUnderstanding me will lead to world peace?!\u201D \u2014 Whose line is this?",
        media: {type:'none'},
        answer: "Anya Forger \u2014 Spy x Family",
        difficulty: "easy"
      },
      {
        q: "\u201CBankai \u2014 Tensa Zangetsu.\u201D This two-word declaration, made during a duel with Byakuya Kuchiki, changed the rules of the fight. Who says this?",
        media: {type:'none'},
        answer: "Ichigo Kurosaki \u2014 Bleach",
        difficulty: "easy"
      },
      {
        q: "\u201CEl Psy Kongroo\u201D is the phrase a self-proclaimed mad scientist says to end every (often imaginary) phone call. Name the character and anime.",
        media: {type:'none'},
        answer: "Rintaro Okabe \u2014 Steins;Gate",
        difficulty: "medium"
      },
      {
        q: "A devil tells a starving boy, \u201CI'll give you my heart. In exchange... show me your dreams.\u201D Name the anime.",
        media: {type:'none'},
        answer: "Chainsaw Man (Pochita's line to Denji)",
        difficulty: "medium"
      },
      {
        q: "A masked rebel declares to a crowd, \u201CI, [Name], command you!\u201D right before unleashing his power. Name the character and anime.",
        media: {type:'none'},
        answer: "Lelouch vi Britannia \u2014 Code Geass",
        difficulty: "hard"
      },
      {
        q: "\u201CI want to know what 'I love you' means.\u201D Name the character who says this after losing someone she loved in war.",
        media: {type:'none'},
        answer: "Violet \u2014 Violet Evergarden",
        difficulty: "hard"
      }
    ]
  },
  {
    name: "Year / Era Guessing",
    emoji: "📅",
    questions: [
      {
        q: "What year did Sailor Moon first air in Japan?",
        media: {type:'none'},
        answer: "1992",
        difficulty: "easy"
      },
      {
        q: "What year did the Pok\u00e9mon anime first air in Japan?",
        media: {type:'none'},
        answer: "1997",
        difficulty: "easy"
      },
      {
        q: "What year was Spirited Away released in Japan?",
        media: {type:'none'},
        answer: "2001",
        difficulty: "medium"
      },
      {
        q: "What decade did the cyberpunk classic Akira come out?",
        media: {type:'none'},
        answer: "1980s (1988)",
        difficulty: "medium"
      },
      {
        q: "In what year was this anime banned in the Philippines by President Marcos for its themes of rebellion \u2014 making its fans famously known as \u201Cthe Voltes V generation\u201D?",
        media: {type:'none'},
        answer: "Voltes V \u2014 banned in 1979",
        difficulty: "hard"
      },
      {
        q: "Put these in order from oldest to newest: Pok\u00e9mon, Spirited Away, Voltes V.",
        media: {type:'none'},
        answer: "Voltes V (1977) \u2192 Pok\u00e9mon (1997) \u2192 Spirited Away (2001)",
        difficulty: "hard"
      }
    ]
  }
];

/* =========================================================
   ENGINE
========================================================= */

// Flatten into a single ordered list, tracking category boundaries
let FLAT = [];
CATEGORIES.forEach((cat, ci) => {
  cat.questions.forEach((q, qi) => {
    FLAT.push({...q, categoryName: cat.name, categoryEmoji: cat.emoji, catIndex: ci, qIndexInCat: qi});
  });
});

let current = -1; // -1 = landing page
let revealed = false;
let activeCategory = null; // null = play-all mode, otherwise index into CATEGORIES
let categoryOrder = CATEGORIES.map((_, i) => i); // display order on landing page
let playedCategories = new Set(); // tracks which categories have been played this session

function shuffleCategoryOrder(){
  for(let i = categoryOrder.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [categoryOrder[i], categoryOrder[j]] = [categoryOrder[j], categoryOrder[i]];
  }
}
shuffleCategoryOrder(); // randomize positions on first load so mystery cards are genuinely unpredictable

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const jumpBtn = document.getElementById('jumpBtn');

function diffLabel(d){
  if(d === 'easy') return 'Easy';
  if(d === 'medium') return 'Medium';
  return 'Hard';
}

function renderMedia(media, qIndex){
  if(!media || media.type === 'none') return '';
  if(media.type === 'image'){
    return `<div class="media-wrap"><img src="${media.src}" alt="Trivia image"></div>`;
  }
  if(media.type === 'audio'){
    return `
      <div class="media-wrap">
        <div class="audio-player-wrap">
          <audio controls preload="metadata">
            <source src="${media.src}" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
        </div>
      </div>`;
  }
  if(media.type === 'spotify'){
    return `<div class="media-wrap"><iframe src="${media.src}" height="180" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe></div>`;
  }
  if(media.type === 'youtube'){
    return `<div class="media-wrap"><div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${media.id}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div></div>`;
  }
  return '';
}

function renderIntro(){
  const cards = categoryOrder.map((realIdx, displayIdx) => {
    const cat = CATEGORIES[realIdx];
    const isPlayed = playedCategories.has(realIdx);
    const cardNum = String(displayIdx + 1).padStart(2, '0');
    return `
      <button class="cat-card mystery ${isPlayed ? 'played' : ''}" data-cat="${realIdx}" ${isPlayed ? 'disabled' : ''}>
        <div class="cat-card-inner">
          <div class="cat-card-face cat-card-back">
            <div class="cat-card-mark">${isPlayed ? '✓' : '?'}</div>
            <div class="cat-card-num">${isPlayed ? 'Played' : 'Round ' + cardNum}</div>
          </div>
          <div class="cat-card-face cat-card-front">
            <div class="cat-card-emoji">${cat.emoji}</div>
            <div class="cat-card-name">${cat.name}</div>
            <div class="cat-card-count">${cat.questions.length} Questions</div>
          </div>
        </div>
      </button>`;
  }).join('');

  stage.innerHTML = `
    <div class="landing-screen">
      <div class="intro-sub">${CATEGORIES.length} Categories &middot; ${FLAT.length} Questions</div>
      <div class="intro-title small">ANIME<br><span class="accent">TRIVIA</span> NIGHT</div>
      <div class="landing-actions">
        <button class="start-btn" id="startAllBtn">Play All In Order &rarr;</button>
        <button class="shuffle-btn" id="resetBtn">↺ Reset Round Tracker</button>
      </div>
      <div class="cat-grid">${cards}</div>
      <div class="landing-hint">Tap a mystery card to reveal &amp; play that round</div>
    </div>
  `;

  document.getElementById('startAllBtn').addEventListener('click', () => {
    activeCategory = null;
    goTo(0);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    playedCategories.clear();
    shuffleCategoryOrder();
    renderIntro();
  });

  stage.querySelectorAll('.cat-card.mystery').forEach(btn => {
    btn.addEventListener('click', () => {
      if(btn.classList.contains('played')) return;
      const ci = parseInt(btn.dataset.cat, 10);
      btn.classList.add('flipped');
      btn.disabled = true;
      setTimeout(() => {
        playedCategories.add(ci);
        enterCategory(ci);
      }, 750);
    });
  });

  counter.textContent = `00 / ${String(FLAT.length).padStart(2,'0')}`;
}

function renderOutro(){
  stage.innerHTML = `
    <div class="outro-screen">
      <div class="intro-sub">That's a wrap</div>
      <div class="intro-title">GOOD<br><span class="accent">GAME</span></div>
      <button class="start-btn" id="backHomeBtn">Back to Categories</button>
    </div>
  `;
  document.getElementById('backHomeBtn').addEventListener('click', () => goTo(-1));
  counter.innerHTML = `<b>${String(FLAT.length).padStart(2,'0')}</b> / ${String(FLAT.length).padStart(2,'0')}`;
}

function renderQuestion(i){
  const item = FLAT[i];
  revealed = false;

  const inCatTotal = activeCategory !== null ? CATEGORIES[activeCategory].questions.length : CATEGORIES[item.catIndex].questions.length;
  const inCatNum = activeCategory !== null ? (i - categoryStartIndex(activeCategory)) + 1 : item.qIndexInCat + 1;

  stage.innerHTML = `
    <div class="card">
      <div class="meta-row">
        <span class="tag category hidden-cat" id="catTag">??? &middot; Mystery Category</span>
        <span class="tag diff-${item.difficulty}">${diffLabel(item.difficulty)}</span>
        <span class="q-number">Q${inCatNum} of ${inCatTotal}</span>
      </div>
      <div class="question-text">${item.q}</div>
      ${renderMedia(item.media, i)}
      <div class="answer-zone" id="answerZone">
        <button class="reveal-btn" id="revealBtn">Reveal Answer</button>
      </div>
    </div>
  `;

  document.getElementById('revealBtn').addEventListener('click', () => {
    revealed = true;
    document.getElementById('catTag').textContent = `${item.categoryEmoji} ${item.categoryName}`;
    document.getElementById('catTag').classList.remove('hidden-cat');
    const bonusHtml = item.bonus ? `<div class="bonus-text">🎁 ${item.bonus}</div>` : '';
    document.getElementById('answerZone').innerHTML = `<div class="answer-wrap"><div class="answer-text">${item.answer}</div>${bonusHtml}</div>`;
  });

  counter.innerHTML = `<b>${String(i+1).padStart(2,'0')}</b> / ${String(FLAT.length).padStart(2,'0')}`;
}

function categoryStartIndex(ci){
  let offset = 0;
  for(let k=0; k<ci; k++) offset += CATEGORIES[k].questions.length;
  return offset;
}

function categoryEndIndex(ci){
  return categoryStartIndex(ci) + CATEGORIES[ci].questions.length - 1;
}

function enterCategory(ci){
  activeCategory = ci;
  current = -2; // -2 = category intro screen state
  renderCategoryIntro(ci);
  updateNav();
}

function renderCategoryIntro(ci){
  const cat = CATEGORIES[ci];
  const art = CATEGORY_ART[cat.name] || '';

  stage.innerHTML = `
    <div class="cat-intro-screen">
      <div class="cat-intro-art-wrap">
        <img src="${art}" alt="${cat.name} illustration" class="cat-intro-art">
      </div>
      <div class="cat-intro-emoji">${cat.emoji}</div>
      <div class="intro-title small">${cat.name.toUpperCase()}</div>
      <div class="intro-sub">${cat.questions.length} Questions</div>
      <button class="start-btn" id="startRoundBtn">Start Round &rarr;</button>
    </div>
  `;

  document.getElementById('startRoundBtn').addEventListener('click', () => {
    goTo(categoryStartIndex(ci));
  });

  counter.textContent = `00 / ${String(FLAT.length).padStart(2,'0')}`;
}

function goTo(i){
  if(i < 0){
    current = -1;
    activeCategory = null;
    renderIntro();
  } else if(activeCategory !== null && i > categoryEndIndex(activeCategory)){
    // finished this category's questions -> go back to landing
    current = -1;
    activeCategory = null;
    renderIntro();
  } else if(activeCategory === null && i >= FLAT.length){
    current = FLAT.length;
    renderOutro();
  } else {
    current = i;
    renderQuestion(i);
  }
  updateNav();
}

function updateNav(){
  const atLanding = current <= -1;
  const lowerBound = activeCategory !== null ? categoryStartIndex(activeCategory) : 0;
  const upperBound = activeCategory !== null ? categoryEndIndex(activeCategory) : FLAT.length - 1;

  prevBtn.disabled = atLanding || current <= lowerBound;

  if(atLanding){
    prevBtn.disabled = true;
    nextBtn.disabled = true;
  } else {
    nextBtn.disabled = false;
    nextBtn.textContent = current >= upperBound ? 'Finish Round →' : 'Next →';
  }

  jumpBtn.textContent = activeCategory !== null ? '🏠 Categories' : '🏠 Home';
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));
jumpBtn.addEventListener('click', () => goTo(-1));

/* Keyboard nav for host convenience */
document.addEventListener('keydown', (e) => {
  if(current === -1) return; // no keyboard nav on landing page
  if(e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if(e.key === 'ArrowLeft') goTo(current - 1);
  if(e.key === 'r' || e.key === 'R'){
    const btn = document.getElementById('revealBtn');
    if(btn) btn.click();
  }
});

goTo(-1);
</script>

</body>
</html>
